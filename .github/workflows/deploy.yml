name: Build and Deploy Ecommerce

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: aslamdockerhub
  BACKEND_IMAGE: aslamdockerhub/ecommerce-backend
  FRONTEND_IMAGE: aslamdockerhub/ecommerce-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ecommerce.pem
          chmod 600 ~/.ssh/ecommerce.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on EC2 Kubernetes
        run: |
          ssh -i ~/.ssh/ecommerce.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            set -e
            cd /home/ubuntu/ecommerce-k8s
            git pull origin main
            bash scripts/deploy.sh aslamdockerhub/ecommerce-backend:latest aslamdockerhub/ecommerce-frontend:latest
          '
